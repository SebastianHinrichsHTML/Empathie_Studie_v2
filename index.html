  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #f5f4f0;
      --surface:     #ffffff;
      --surface-alt: #f0efeb;
      --border:      #dbd7ce;
      --border-focus:#6a8eaf;
      --text:        #1a1e26;
      --text-mid:    #4a5468;
      --text-muted:  #8a93a6;
      --accent:      #2d5f8a;
      --accent-l:    #e6eff8;
      --accent-m:    #4a7fac;
      --rule:        #e0dbd3;
      --success:     #3a7d5a;
      --warn:        #a05030;
      --mono:        'Courier New', Courier, monospace;
      --serif:       'Lora', Georgia, serif;
      --sans:        'Inter', system-ui, sans-serif;
      --shadow:      0 1px 4px rgba(0,0,0,0.07), 0 4px 16px rgba(0,0,0,0.04);
    }

    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      font-family: var(--sans);
      color: var(--text);
      font-size: 15px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    .site-header {
      position: sticky; top: 0; z-index: 200;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 1px 6px rgba(0,0,0,0.07);
      padding: 13px 24px;
    }
    .header-inner {
      max-width: 760px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .header-left { display: flex; flex-direction: column; gap: 1px; }
    .header-label { font-family: var(--mono); font-size: 10px; letter-spacing: 2px; color: var(--accent); text-transform: uppercase; }
    .header-sub { font-size: 11px; color: var(--text-muted); }

    .progress-wrap { max-width: 760px; margin: 0 auto; padding: 28px 24px 0; }
    .progress-track { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; margin-bottom: 8px; }
    .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.45s ease; }
    .progress-meta { display: flex; justify-content: space-between; align-items: center; }
    .progress-steps { font-family: var(--mono); font-size: 11px; color: var(--text-muted); }

    .wrap { max-width: 760px; margin: 0 auto; padding: 32px 24px 80px; }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 36px 40px; margin-bottom: 20px; box-shadow: var(--shadow); }
    .card-blue { background: var(--accent-l); border: 1px solid #c4d9ec; border-radius: 8px; padding: 28px 32px; margin-bottom: 20px; }

    .tags { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 18px; }
    .tag { display: inline-block; padding: 3px 10px; border-radius: 3px; font-family: var(--mono); font-size: 10px; letter-spacing: 1.2px; text-transform: uppercase; border: 1px solid currentColor; opacity: 0.85; }
    .tag-accent  { color: var(--accent);  background: rgba(45,95,138,0.08); }
    .tag-mid     { color: var(--accent-m);background: rgba(74,127,172,0.08); }
    .tag-success { color: var(--success); background: rgba(58,125,90,0.08); }
    .tag-purple  { color: #7a6a9a;        background: rgba(122,106,154,0.1); }

    .page-title { font-family: var(--serif); font-size: 24px; font-weight: 600; line-height: 1.4; color: var(--text); margin-bottom: 6px; }
    .page-sub { font-family: var(--mono); font-size: 12px; color: var(--text-muted); letter-spacing: 0.4px; margin-bottom: 28px; }
    .section-title { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
    .body-text { font-size: 14.5px; color: var(--text-mid); line-height: 1.78; }
    .note { font-size: 12.5px; color: var(--text-muted); font-style: italic; line-height: 1.55; }

    .divider { display: flex; align-items: center; gap: 12px; margin: 30px 0 22px; }
    .divider-line { flex: 1; height: 1px; background: var(--rule); }
    .divider-label { font-family: var(--mono); font-size: 10px; color: var(--text-muted); letter-spacing: 1.5px; text-transform: uppercase; white-space: nowrap; }

    .vignette-hint { font-size: 12.5px; color: var(--accent-m); font-style: italic; margin-bottom: 14px; }
    .vignette-text {
      font-family: var(--serif); font-size: 15.5px; line-height: 1.9;
      color: var(--text); background: var(--surface);
      border: 1px solid #c4d9ec; border-radius: 6px;
      padding: 22px 26px; white-space: pre-wrap;
    }

    .dim-card { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 20px 24px; margin-bottom: 10px; }
    .dim-header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; margin-bottom: 8px; }
    .dim-header-left { display: flex; align-items: center; gap: 10px; }
    .dim-check { font-family: var(--mono); font-size: 11px; color: var(--success); }
    .dim-frage { font-size: 14px; color: var(--text-mid); line-height: 1.6; margin-bottom: 14px; }

    .likert-wrap { user-select: none; }
    .likert-buttons { display: flex; gap: 6px; margin-bottom: 8px; }
    .likert-btn {

    .likert-anchors { display: flex; justify-content: space-between; }
    .likert-anker { font-size: 10.5px; color: var(--text-muted); line-height: 1.35; }
    .likert-anker.right { text-align: right; }

    .btn { display: inline-flex; align-items: center; gap: 8px; padding: 13px 28px; border-radius: 5px; font-size: 13px; font-weight: 600; letter-spacing: 0.4px; cursor: pointer; font-family: var(--sans); transition: all 0.15s; border: 1.5px solid transparent; }
    .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .btn-primary:hover { background: #245278; border-color: #245278; }
    .btn-disabled { background: var(--surface-alt); color: var(--text-muted); border-color: var(--border); cursor: not-allowed; }
    .btn-row { display: flex; justify-content: space-between; align-items: center; margin-top: 24px; gap: 12px; flex-wrap: wrap; }
    .validation-msg { font-family: var(--mono); font-size: 12px; }

    .validation-warn { color: var(--warn); }

    .done-icon { font-size: 44px; margin-bottom: 16px; text-align: center; }
    .done-title { font-family: var(--serif); font-size: 22px; font-weight: 600; text-align: center; margin-bottom: 10px; color: var(--accent); }
    .done-text { font-size: 14.5px; color: var(--text-mid); line-height: 1.78; max-width: 520px; margin: 0 auto 28px; text-align: center; }

    .feedback-card { background: var(--surface-alt); border: 1px solid var(--border); border-radius: 6px; padding: 22px 26px; margin-bottom: 12px; }
    .feedback-label { font-size: 13.5px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
    .feedback-hint { font-size: 12px; color: var(--text-muted); margin-bottom: 10px; font-style: italic; }

    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 11px; margin-bottom: 36px; }
    .info-box { background: rgba(45,95,138,0.06); border: 1px solid rgba(45,95,138,0.14); border-radius: 5px; padding: 13px 16px; }
    .info-box-label { font-family: var(--mono); font-size: 9.5px; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); margin-bottom: 5px; }
    .info-box-val { font-size: 13px; color: var(--text-muted); }

    .notice { padding: 14px 18px; background: rgba(45,95,138,0.04); border: 1px solid rgba(45,95,138,0.13); border-radius: 5px; font-size: 13px; color: var(--text-muted); line-height: 1.75; }
    .notice strong { color: var(--accent); }

    textarea { width: 100%; padding: 11px 13px; font-family: var(--sans); font-size: 13.5px; color: var(--text); background: var(--surface); border: 1.5px solid var(--border); border-radius: 5px; resize: vertical; outline: none; line-height: 1.6; transition: border-color 0.15s; }
    textarea:focus { border-color: var(--border-focus); background: #fff; }
    textarea::placeholder { color: var(--text-muted); }

    .consent-box { background: #f0f5fb; border: 1.5px solid #b8d0e8; border-radius: 6px; padding: 24px 28px; margin-top: 28px; }
    .consent-title { font-size: 13px; font-weight: 600; color: var(--accent); margin-bottom: 10px; }
    .consent-label { display: flex; align-items: flex-start; gap: 12px; cursor: pointer; font-size: 13.5px; color: var(--text-mid); line-height: 1.6; }
    .consent-label input[type="checkbox"] { width: 18px; height: 18px; flex-shrink: 0; margin-top: 2px; accent-color: var(--accent); cursor: pointer; }
    .send-btn-wrap { margin-top: 18px; display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }

    .email-status { display: none; padding: 12px 18px; border-radius: 5px; font-size: 13px; font-weight: 500; }
    .email-status.sending { display: block; background: #e8f0fb; border: 1px solid #aac4e0; color: var(--accent); }
    .email-status.ok { display: block; background: #eaf5ef; border: 1px solid #90c8a8; color: var(--success); }
    .email-status.err { display: block; background: #fdf0ec; border: 1px solid #e0a898; color: #a04030; }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #aac4e0; border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .fade-enter { animation: fadeIn 0.28s ease forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    @media (max-width: 600px) {
      .card, .card-blue { padding: 24px 20px; }
      .info-grid { grid-template-columns: 1fr; }
      .likert-btn { padding: 8px 2px; }
      .dim-card { padding: 16px 18px; }
    }
    @media print { .site-header { position: relative; } .btn { display: none; } }
  </style>

<script>
// ─── SERVER SUBMISSION (Cloudflare Worker) ────────────────────────────────────
async function submitToServer(data) {
  const ENDPOINT = "https://fancy-math-1c92.sebastian-hinrichs9.workers.dev";
  const payload = {
    participant_id: data.participant_id || partId,
    study_type: "pretest",
    payload: data
  };
  try {
    const res = await fetch(ENDPOINT, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });
    const result = await res.json();
    return res.ok && result.ok === true;
  } catch (e) {
    console.error("Server submission failed:", e);
    return false;
  }
}

// ─── AUTO-PID ────────────────────────────────────────────────────────────────
// Format: 2 Buchstaben + 4 Ziffern + 2 Buchstaben + 4 Ziffern  (z. B. PT7342MV1905)
// O und I ausgeschlossen (Verwechslungsgefahr mit 0 und 1).
function generatePID() {
  const C = "ABCDEFGHJKLMNPQRSTUVWXYZ";
  const D = "0123456789";
  const r = p => p[Math.floor(Math.random() * p.length)];
  return [r(C),r(C),r(D),r(D),r(D),r(D),r(C),r(C),r(D),r(D),r(D),r(D)].join("");
}

const ALLE_VIGNETTEN = [
  // ── FALL 1: ANNALENA ─────────────────────────────────────────────────────
  { id:"V1a", fall:1, typ:"A1", fallLabel:"Fall 1 – Annalena", label:"Annalena (28) · A1",
    hint:"Bitte lesen Sie den folgenden Text vollständig und aufmerksam durch.",
    text:`Anna (27) hat eine Geschichte von instabilen Bindungen hinter sich. Ihr Vater verließ die Familie früh, und ihre Mutter war durch Depressionen oft emotional nicht verfügbar. Anna hat eine panische Angst vor dem Alleinsein entwickelt. Sie fühlt sich nur dann sicher, wenn sie die Bestätigung bekommt, dass sie gesehen wird. Jede kleinste Distanzierung eines Freundes löst bei ihr existenzielle Verlustängste und Verzweiflung aus, die sie oft nächtelang nicht schlafen lassen. Sie fühlt sich wie ein Blatt im Wind, das ohne die Spiegelung durch andere keine eigene Identität besitzt.`},
  { id:"V1b", fall:1, typ:"A2", fallLabel:"Fall 1 – Annalena", label:"Annalena (28) · A2",
    hint:"Bitte lesen Sie den folgenden Text vollständig und aufmerksam durch.",
    text:`Lena (29) inszeniert in ihrem Freundeskreis ständig dramatische Krisen, um im Mittelpunkt zu stehen. Sie nutzt sexualisierte Provokation und übertriebene Emotionalität, um die Aufmerksamkeit auf sich zu ziehen, selbst bei unpassenden Anlässen wie Beerdigungen oder Hochzeiten anderer. Sie manipuliert ihr soziales Umfeld durch Suizidankündigungen oder theatralische Zusammenbrüche, sobald sich jemand von ihr abwendet. Ihre Freunde fühlen sich zunehmend emotional ausgesaugt, da Lena keinen Raum für die Bedürfnisse anderer lässt und Gespräche immer wieder auf sich selbst lenkt.`},
  { id:"V1c", fall:1, typ:"B",  fallLabel:"Fall 1 – Annalena", label:"Annalena (28) · B",
    hint:"Bitte lesen Sie den folgenden Text vollständig und aufmerksam durch.",
    text:`Annalena (28) wuchs in einem familiären Umfeld auf, in dem Nähe und Verlässlichkeit nur begrenzt vorhanden waren. Ihr Vater verließ die Familie früh, und ihre Mutter war durch wiederkehrende depressive Phasen häufig emotional zurückgezogen. Für Annalena bedeutete das, dass wichtige Bezugspersonen zwar physisch anwesend sein konnten, emotional jedoch oft nicht erreichbar waren. Als Kind erlebte sie wiederholt Momente, in denen sie sich unsichtbar oder übersehen fühlte. Aus diesen Erfahrungen entwickelte sich bei ihr eine ausgeprägte Angst vor dem Alleinsein sowie das Gefühl, nur dann wirklich zu existieren, wenn sie von anderen wahrgenommen und bestätigt wird.

Im Laufe ihrer Entwicklung lernte Annalena, dass sie besonders dann Aufmerksamkeit erhielt, wenn sie ihre Gefühle stark und dramatisch zeigte. Wenn sie weinte, laut wurde oder von Problemen erzählte, reagierten andere Menschen intensiver auf sie. Schrittweise verfestigte sich dadurch ein Muster: Aufmerksamkeit musste aktiv hergestellt werden, bevor sie verloren ging. Hinter diesem Verhalten stand ein tiefes inneres Erleben von Unsicherheit, nämlich die ständige Befürchtung, verlassen oder übersehen zu werden.

Im Erwachsenenalter zeigt sich dieses Muster deutlich in ihrem sozialen Umfeld. In ihrem Freundeskreis inszeniert Annalena häufig dramatische Krisen und stellt ihre emotionalen Zustände stark in den Vordergrund. Sie nutzt provokatives oder sexualisiertes Verhalten und reagiert mit übersteigerter Emotionalität, selbst in Situationen, in denen dies unpassend wirkt, etwa bei Hochzeiten oder Beerdigungen anderer. Wenn sie spürt, dass sich jemand von ihr distanziert, reagiert sie mit intensiven Zusammenbrüchen oder droht mit Selbstverletzung.

Für ihre Freunde wirkt dieses Verhalten zunehmend belastend. Gespräche drehen sich häufig um Annalenas Probleme, während für die Anliegen anderer kaum Raum bleibt. Für Annalena selbst sind die dramatischen Reaktionen weniger bewusst kalkulierte Manipulationen als vielmehr gelernte Strategien, um intensive innere Zustände zu bewältigen. Paradoxerweise führen genau diese Strategien jedoch häufig dazu, dass sich andere Menschen zurückziehen, wodurch sich ihre ursprüngliche Angst vor dem Verlassenwerden immer wieder bestätigt.`},

  // ── FALL 2: MARIELUISE ───────────────────────────────────────────────────
  { id:"V2a", fall:2, typ:"A1", fallLabel:"Fall 2 – Marieluise", label:"Marieluise (35) · A1",

    hint:"Bitte lesen Sie den folgenden Text vollständig und aufmerksam durch.",
    text:`Marieluise (35) wuchs in einem Elternhaus auf, in dem Anerkennung eng an Leistung gebunden war. Ihr Vater stellte hohe akademische Anforderungen und vermittelte früh die Botschaft, dass Wert und Zuneigung vor allem durch Erfolg verdient werden müssen. Fehler wurden selten offen besprochen, sondern häufig mit langanhaltendem Schweigen beantwortet. Für Marieluise bedeuteten solche Phasen nicht nur Kritik, sondern auch emotionalen Entzug. Schon als Kind entwickelte sie daher eine starke Sensibilität gegenüber Fehlern und ein tiefes Bedürfnis, Erwartungen vollständig zu erfüllen.

Im Erwachsenenalter arbeitet Marieluise mit großer Intensität und übernimmt häufig Aufgaben, die eigentlich nicht in ihren Verantwortungsbereich fallen. Gleichzeitig begleitet sie ständig die Sorge, den Erwartungen nicht zu genügen. Diese innere Anspannung führt zu Erschöpfung, wiederkehrenden Weinanfällen und dem Gefühl, im Team isoliert und unverstanden zu sein.

// ─── VIGNETTEN-AUSWAHL ───────────────────────────────────────────────────────
// Pro Teilnehmer:
//   Schritt 1: Pro Fall (1, 2, 3) deterministisch genau eine der drei Versionen wählen.
//   Schritt 2: Die drei ausgewählten Vignetten in ihrer Reihenfolge mischen.
// Beides basiert auf dem seeded RNG, der aus der participant_id abgeleitet wird.
function buildVignettenOrder(pid) {
  const seed = pid.split("").reduce((a, c) => a + c.charCodeAt(0), 0);
  let s = (Math.abs(seed) * 1327 + 7) % 2147483647;
  const rng = () => { s = (s * 16807) % 2147483647; return (s - 1) / 2147483646; };

  // Schritt 1: Pro Fall eine Version zufällig (aber reproduzierbar) auswählen
  const selected = [1, 2, 3].map(fall => {
    const versions = ALLE_VIGNETTEN.filter(v => v.fall === fall);
    return versions[Math.floor(rng() * versions.length)];
  });

  // Schritt 2: Reihenfolge der drei gewählten Vignetten mischen
  for (let i = selected.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [selected[i], selected[j]] = [selected[j], selected[i]];
  }
  return selected; // genau 3 Vignetten, je eine pro Fall
}

function render() {
  const wrap = document.getElementById("mainWrap");
  wrap.innerHTML = ""; wrap.className = "wrap fade-enter"; void wrap.offsetWidth;
  const pw = document.getElementById("progressWrap");
  const pf = document.getElementById("progressFill");
  const ps = document.getElementById("progressSteps");

  if (phase === "intro") {
    pw.style.display = "none";
    setHeaderTag(tag("tag-accent","Einleitung"));
    wrap.innerHTML = renderIntro();
  } else if (phase === "vignette") {
    pw.style.display = "block";
    pf.style.width = (vigIdx / orderedVig.length * 100) + "%";
    ps.textContent = `${vigIdx+1} / ${orderedVig.length}`;
    setHeaderTag(tag("tag-accent", `Vignette ${vigIdx+1} von ${orderedVig.length} · ${orderedVig[vigIdx].fallLabel}`));

  } else if (phase === "done") {
    pw.style.display = "none"; pf.style.width = "100%";
    setHeaderTag(tag("tag-success","Abgeschlossen"));
    wrap.innerHTML = renderDone();
  }
  window.scrollTo({ top: 0, behavior: "smooth" });
}

// ─── EXPORT ───────────────────────────────────────────────────────────────────
// Exportstruktur (eine Zeile pro Vignette):
//   participant_id | duration_seconds | vignette_id | vignette_fall | vignette_typ |
//   opfer_wahrnehmung | taeter_wahrnehmung | ambivalenz | sympathie | verstaendlichkeit |
//   vignette_unklar | vignette_unrealistisch | vignette_sprache

function buildExportRows() {
  // Korrektur 2: gespeicherten Wert verwenden – nicht neu aus Date.now() berechnen
  const duration_seconds = durationSeconds ?? 0;

  // Änderung 6: neue Exportstruktur – 3 Zeilen (eine pro gezeigter Vignette)
  // Feedback (unrealistisch / sprache) erscheint nur in Zeile 1, restliche Zeilen leer.
  return orderedVig.map((v, i) => ({
    participant_id:        partId,
    duration_seconds:      duration_seconds,
    vignette_id:           v.id,
    vignette_fall:         v.fall,
    vignette_typ:          v.typ,
    opfer_wahrnehmung:     ratings[v.id]["opfer_wahrnehmung"]  || 99,
    taeter_wahrnehmung:    ratings[v.id]["taeter_wahrnehmung"] || 99,
    ambivalenz:            ratings[v.id]["ambivalenz"]         || 99,
    sympathie:             ratings[v.id]["sympathie"]          || 99,
    verstaendlichkeit:     ratings[v.id]["verstaendlichkeit"]  || 99,
    vignette_unklar:           vignetteUnklar[v.id]?.trim()        || "",
    vignette_unrealistisch:    vignetteUnrealistisch[v.id]?.trim() || "",
    vignette_sprache:          vignetteSprache[v.id]?.trim()       || "",
  }));
}

function formatDataForEmail() {
  const ts   = new Date().toLocaleString("de-DE");
  const rows = buildExportRows();
  const dur  = rows[0]?.duration_seconds ?? 0;

  let body  = `PRETEST-AUSWERTUNG · Vignetten-Qualitätsprüfung\n`;
  body     += `Zeitstempel:      ${ts}\n`;
  body     += `Participant ID:   ${partId}\n`;
  body     += `Bearbeitungsdauer: ${dur} Sekunden\n`;
  body     += `${"─".repeat(60)}\n\n`;

  // Rohdaten je Vignette (3 Zeilen)
  rows.forEach((row, i) => {
    body += `VIGNETTE ${String(i+1).padStart(2,"0")}  [${row.vignette_id}]  Fall ${row.vignette_fall} · ${row.vignette_typ}\n`;
    body += `  opfer_wahrnehmung      : ${row.opfer_wahrnehmung}\n`;
    body += `  taeter_wahrnehmung     : ${row.taeter_wahrnehmung}\n`;
    body += `  ambivalenz             : ${row.ambivalenz}\n`;
    body += `  sympathie              : ${row.sympathie}\n`;
    body += `  verstaendlichkeit      : ${row.verstaendlichkeit}\n`;
    body += `  vignette_unklar        : ${row.vignette_unklar        || "(keine Angabe)"}\n`;
    body += `  vignette_unrealistisch : ${row.vignette_unrealistisch || "(keine Angabe)"}\n`;
    body += `  vignette_sprache       : ${row.vignette_sprache       || "(keine Angabe)"}\n\n`;
  });

  // CSV (Header aus Zeile 1 des Export-Arrays → automatisch korrekt)
  body += `${"─".repeat(60)}\n`;
  body += `CSV\n`;
  body += Object.keys(rows[0]).join(";") + "\n";
  rows.forEach(row => {
    body += Object.values(row).map(v =>
      typeof v==="string" && v.includes(";") ? `"${v}"` : v
    ).join(";") + "\n";
  });

  // SPSS
  body += `\n${"─".repeat(60)}\n`;
  body += `SPSS DATA LIST FREE\n`;
  body += `  / participant_id (A12)\n`;
  body += `    duration_seconds (F6)\n`;
  body += `    vignette_id (A3) vignette_fall (F1) vignette_typ (A2)\n`;
  body += `    opfer_wahrnehmung (F1) taeter_wahrnehmung (F1) ambivalenz (F1)\n`;
  body += `    sympathie (F1) verstaendlichkeit (F1)\n`;
  body += `    vignette_unklar (A200)\n`;
  body += `    vignette_unrealistisch (A200) vignette_sprache (A200)\n`;
  body += `  .\n\n`;
  body += `VARIABLE LABELS\n`;
  body += `  participant_id        'Teilnehmenden-ID (keine Personenangaben)'\n`;
  body += `  duration_seconds     'Bearbeitungsdauer in Sekunden (gesamte Sitzung)'\n`;
  body += `  vignette_id          'Vignetten-ID (V1a–V3c)'\n`;
  body += `  vignette_fall        'Fallnummer (1=Annalena / 2=Marieluise / 3=Jan-Luca)'\n`;
  body += `  vignette_typ         'Bedingung (A1=Opfer / A2=Taeter / B=Integriert)'\n`;
  body += `  opfer_wahrnehmung    'Die Person wirkt eher wie ein Opfer ihrer Umstaende.'\n`;
  body += `  taeter_wahrnehmung   'Die Person wirkt eher verantwortlich fuer die Situation.'\n`;
  body += `  ambivalenz           'Die Situation wirkt moralisch ambivalent.'\n`;
  body += `  sympathie            'Wie sympathisch erscheint Ihnen diese Person?'\n`;
  body += `  verstaendlichkeit    'Wie verstaendlich war die Fallbeschreibung?'\n`;
  body += `  vignette_unklar        'Optionale Unklarheiten zur jeweiligen Vignette'\n`;
  body += `  vignette_unrealistisch 'Feedback: Unrealistische Inhalte (vignettenbezogen)'\n`;
  body += `  vignette_sprache       'Feedback: Sprachliche Auffaelligkeiten (vignettenbezogen)'\n`;
  body += `  .\n\n`;
  body += `VALUE LABELS\n`;
  body += `  opfer_wahrnehmung taeter_wahrnehmung ambivalenz sympathie verstaendlichkeit\n`;
  body += `  1 'Stimme ueberhaupt nicht zu' 2 'Stimme eher nicht zu'\n`;
  body += `  3 'Teils-teils' 4 'Stimme eher zu' 5 'Stimme voll zu' 99 'Fehlend'\n`;
  body += `  .\n`;

  return body;
}

// ─── ACTIONS ─────────────────────────────────────────────────────────────────
function startStudy() {
  tsStart    = Date.now();   // Änderung 5: Startzeitpunkt für duration_seconds
  orderedVig = buildVignettenOrder(partId);
  phase = "vignette"; vigIdx = 0;
  render();
}

function setRating(vigId, itemId, val) {
  ratings[vigId][itemId] = val;
  const c = document.getElementById(`likert-${vigId}-${itemId}`);
  if (c) c.querySelectorAll(".likert-btn").forEach((b,i) => b.classList.toggle("selected",i+1===val));
  const ck = document.getElementById(`check-${vigId}-${itemId}`);
  if (ck) { ck.textContent = `✓ ${val} / 5`; ck.style.display = "inline"; }
  const ok = allRated(vigId);
  const nb = document.getElementById("nextBtn");
  const vm = document.getElementById("validMsg");
  if (nb) { nb.className=`btn ${ok?"btn-primary":"btn-disabled"}`; nb.onclick=ok?nextVig:null; }
  if (vm) { vm.className=`validation-msg ${ok?"validation-ok":"validation-warn"}`;
    vm.textContent = ok ? "✓ Alle Fragen beantwortet" : `⚠ Bitte alle ${MC_ITEMS.length} Fragen beantworten`; }
}

function nextVig() {
  if (!allRated(orderedVig[vigIdx].id)) return;
  if (vigIdx < orderedVig.length - 1) {
    vigIdx++;
  } else {
    // Letzte Vignette abgeschlossen → Dauer einmalig festhalten
    if (durationSeconds === null) {
      tsEnd           = Date.now();
      durationSeconds = Math.round((tsEnd - tsStart) / 1000);
    }
    phase = "done";
  }
  render();
}

function toggleStartBtn() {
  const cb  = document.getElementById("startConsentCheck");
  const btn = document.getElementById("startBtn");
  if (!btn || !cb) return;
  btn.className = cb.checked ? "btn btn-primary" : "btn btn-disabled";
  btn.disabled  = !cb.checked;
  btn.onclick   = cb.checked ? startStudy : null;
}

function toggleSendBtn() {
  const cb=document.getElementById("consentCheck"), btn=document.getElementById("sendBtn");
  if (!btn||!cb) return;
  btn.className = cb.checked?"btn btn-primary":"btn btn-disabled";
  btn.disabled  = !cb.checked;
}

async function sendResults() {
  const cb = document.getElementById("consentCheck");
  if (!cb?.checked) return;
  const btn = document.getElementById("sendBtn");
  const status = document.getElementById("emailStatus");
  btn.disabled = true;
  btn.className = "btn btn-disabled";
  status.className = "email-status sending";
  status.style.display = "block";
  status.innerHTML = `<span class="spinner"></span> Daten werden gespeichert …`;

  const data = {
    participant_id: partId,
    duration_seconds: durationSeconds,
    rows: buildExportRows()
  };

  const ok = await submitToServer(data);
  if (ok) {
    status.className = "email-status ok";
    status.textContent = "✓ Auswertung erfolgreich gespeichert. Vielen Dank!";
    btn.style.display = "none";
    document.getElementById("consentCheck").disabled = true;
  } else {
    status.className = "email-status err";
    status.textContent = "⚠ Automatische Speicherung fehlgeschlagen. Bitte laden Sie die CSV-Datei lokal herunter.";
    btn.disabled = false;
    btn.className = "btn btn-primary";
  }
}

// ─── CSV-DOWNLOAD ─────────────────────────────────────────────────────────────
function downloadCSV() {
  const rows = buildExportRows();
  const header = Object.keys(rows[0]).join(";");
  const csvLines = rows.map(row =>
    Object.values(row).map(v =>
      typeof v === "string" && (v.includes(";") || v.includes("\n") || v.includes('"'))
        ? `"${v.replace(/"/g, '""')}"` : v
    ).join(";")
  );
  const csvContent = [header, ...csvLines].join("\n");
  const blob = new Blob(["\uFEFF" + csvContent], { type: "text/csv;charset=utf-8;" });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href     = url;
  a.download = `pretest_${partId}_${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ─── INIT ────────────────────────────────────────────────────────────────────
render();
</script>
